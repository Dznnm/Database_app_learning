{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border-secondary">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4"> Ruang Rasa Cafe</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pasword</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr class="border-secondary">
                <p class="text-center text-secondary mb-0" style="font-size: 18px;">
                    Belum punya akun? <a href="{{ url_for('register')}}">Daftar di sini!</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

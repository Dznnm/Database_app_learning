{% extends 'base.html' %}

{% block title %}Menu{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Daftar Menu</h4>
    <a href="{{ url_for('add_menu' )}}" class="btn btn-primary btn-sm">Tambah Menu</a>
</div>

<div class="card border-secondary">
    <div class="card-body p-0">
        <table class="table table-dark table-hover mb-0">
            <thead>
                <tr>
                    <th>Nama Menu</th>
                    <th>Harga</th>
                    <th>Deskripsi</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for m in menus %}
                <tr>
                    <td>{{ m.nama_menu }}</td>
                    <td>{{ m.harga | rupiah }}</td>
                    <td>{{ m.deskripsi or '-' }}</td>
                    <td>
                        <a href="{{ url_for('recipe', menu_id=m.id) }}" class="btn btn-sm btn-outline-info">Resep</a>
                        <a href="{{ url_for('edit_menu', id=m.id) }}" class="btn btn-sm btn-outline-secondary">Edit</a>
                        <a href="{{ url_for('delete_menu', id=m.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Hapus menu?')">Hapus</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-secondary">Belum ada menu!</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
